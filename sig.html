<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioLab - Sign In</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d9488,#1e3a5f);
}

/* Container */
.container{
    display:flex;
    width:900px;
    max-width:95%;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.3);
}

/* Left Side */
.left{
    flex:1;
    background:linear-gradient(135deg,#0f766e,#0d9488);
    color:#fff;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h2{
    font-size:32px;
    margin-bottom:20px;
}

.left p{
    font-size:15px;
    opacity:0.9;
}

/* Right Side */
.right{
    flex:1;
    background:#fff;
    padding:50px;
}

.right h2{
    margin-bottom:30px;
    color:#1e293b;
}

/* Input */
.input-group{
    position:relative;
    margin-bottom:25px;
}

.input-group input{
    width:100%;
    padding:15px 15px 15px 45px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
}

.input-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#0d9488;
}

/* Button */
.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d9488;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#0f766e;
}

/* Footer */
.footer{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.footer a{
    color:#0d9488;
    text-decoration:none;
    font-weight:600;
}

/* Responsive */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }
    .left{
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Left -->
    <div class="left">
        <h2>Stackly</h2>
        <p>Advanced Laboratory & Medical Research Platform. Secure login to access your reports and services.</p>
    </div>

    <!-- Right -->
    <div class="right">
        <h2>Sign In</h2>

        <form onsubmit="login(event)">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

          <a href="login.html"> <button class="btn">Login</button></a> 
        </form>

        <div class="footer">
            Don't have an account? <a href="sig.html">Sign Up</a>
        </div>
    </div>

</div>

<script>
function login(e){
    e.preventDefault();
    alert("Login Successful (Demo)");
}
</script>

</body>
</html>
