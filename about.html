<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            --primary-light: #14b8a6;
            --primary-dark: #0f766e;
            --secondary: #134e4a;
            --dark-blue: #1e3a5f;
            --darker-blue: #0f172a;
            --light-bg: #f8fafc;
            --lighter-bg: #f1f5f9;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            overflow-x: hidden;
            background: var(--light-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* Base animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(2deg); }
            50% { transform: translateY(-5px) rotate(0deg); }
            75% { transform: translateY(-20px) rotate(-2deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(13, 148, 136, 0); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Utility Classes */
        .animate-on-scroll { 
            opacity: 0; 
            transform: translateY(40px); 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .animate-on-scroll.visible { 
            opacity: 1; 
            transform: translateY(0); 
        }
        
        .delay-100 { transition-delay: 0.1s; }
        .delay-200 { transition-delay: 0.2s; }
        .delay-300 { transition-delay: 0.3s; }
        .delay-400 { transition-delay: 0.4s; }

        /* Page Loader */
        .page-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--dark-blue), var(--darker-blue));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-loader.hidden { opacity: 0; visibility: hidden; }

        .loader-container {
            position: relative; width: 120px; height: 120px;
        }

        .loader-ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: var(--primary);
            border-radius: 50%; animation: rotate 1s linear infinite;
        }

        .loader-ring:nth-child(2) {
            width: 80%; height: 80%; top: 10%; left: 10%;
            border-top-color: var(--primary-light);
            animation-duration: 1.5s; animation-direction: reverse;
        }

        .loader-ring:nth-child(3) {
            width: 60%; height: 60%; top: 20%; left: 20%;
            border-top-color: var(--accent);
            animation-duration: 2s;
        }

        .loader-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 30px; color: var(--white); animation: pulse 1.5s infinite;
        }

        .loader-text {
            margin-top: 30px; color: var(--white); font-size: 18px;
            letter-spacing: 3px; animation: flash 2s infinite;
        }

        /* Top Bar */
        .top-bar {
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--darker-blue) 100%);
            padding: 15px 0; position: relative; overflow: hidden;
        }

        .top-bar::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }

        .top-bar-content {
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px; position: relative; z-index: 1;
        }

        .top-left {
            display: flex; align-items: center; gap: 30px;
        }

        .phone-number, .email-info {
            color: var(--white); display: flex; align-items: center;
            gap: 10px; font-size: 14px; animation: fadeInLeft 0.8s ease-out;
        }

        .phone-number i, .email-info i {
            color: var(--primary); animation: pulse 2s infinite;
        }

        .top-bar-right {
            display: flex; align-items: center; gap: 20px;
        }

        .language-selector { position: relative; }

        .lang-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: var(--white); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 13px; transition: all 0.3s ease;
        }

        .lang-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .lang-dropdown {
            position: absolute; top: 100%; right: 0; margin-top: 10px;
            background: var(--white); border-radius: 10px; padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); opacity: 0; visibility: hidden;
            transform: translateY(-10px); transition: all 0.3s ease; min-width: 150px;
            z-index: 100;
        }

        .lang-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }

        .lang-option {
            padding: 10px 15px; cursor: pointer; border-radius: 5px;
            transition: all 0.3s ease; color: var(--text-dark);
        }

        .lang-option:hover { background: var(--light-bg); color: var(--primary); }

        /* Login & Appointment Buttons */
        .login-btn {
            background: transparent; color: var(--white);
            padding: 12px 28px; border: 2px solid var(--primary);
            border-radius: 30px; text-decoration: none; font-size: 13px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden; display: flex;
            align-items: center; gap: 10px;
            animation: fadeInRight 0.8s ease-out 0.2s both;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .login-btn:hover {
            background: var(--primary); transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(13, 148, 136, 0.4);
        }

        .appointment-btn {
            background: var(--primary); color: var(--white);
            padding: 12px 28px; border-radius: 30px; text-decoration: none;
            font-size: 13px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; position: relative; overflow: hidden;
            animation: fadeInRight 0.8s ease-out;
            transition: all 0.4s ease; border: 2px solid var(--primary);
        }

        .appointment-btn:hover {
            background: transparent; transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(13, 148, 136, 0.4);
        }

        /* Navigation */
        nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            animation: fadeInDown 0.8s ease-out;
        }

        .nav-container {
            max-width: 1400px; margin: 0 auto; padding: 18px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo {
            display: flex; align-items: center; gap: 12px;
            font-size: 32px; font-weight: 800; color: var(--dark-blue);
            text-decoration: none; transition: all 0.4s ease;
        }

        .logo:hover { transform: scale(1.05); }

        .logo-icon {
            width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 20px;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(13, 148, 136, 0.3);
        }

        .nav-links {
            display: flex; list-style: none; gap: 40px; align-items: center;
        }

        .nav-links li { position: relative; }

        .nav-links a {
            text-decoration: none; color: var(--text-dark); font-weight: 500;
            font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px;
            position: relative; transition: all 0.3s ease; padding: 10px 0;
            display: block;
        }

        .nav-links a::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2px;
        }

        .nav-links a:hover { color: var(--primary); }
        .nav-links a:hover::after { width: 100%; }

        .dropdown {
            position: absolute; top: 100%; left: 0; margin-top: 15px;
            background: var(--white); border-radius: 15px; padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); opacity: 0; visibility: hidden;
            transform: translateY(-20px) scale(0.95); transition: all 0.4s ease;
            min-width: 220px; border: 1px solid rgba(0,0,0,0.05);
        }

        .nav-links li:hover .dropdown {
            opacity: 1; visibility: visible; transform: translateY(0) scale(1);
        }

        .dropdown a {
            padding: 12px 20px; border-radius: 10px; display: flex;
            align-items: center; gap: 10px; font-size: 13px;
        }

        .dropdown a:hover {
            background: var(--light-bg); transform: translateX(5px);
        }

        .nav-icons {
            display: flex; gap: 15px; align-items: center;
        }

        .nav-icon {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dark); text-decoration: none;
            position: relative; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--light-bg); font-size: 16px;
        }

        .nav-icon:hover {
            background: var(--primary); color: var(--white);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(13, 148, 136, 0.4);
        }

        .cart-badge {
            position: absolute; top: -5px; right: -5px;
            background: linear-gradient(135deg, var(--accent), #f97316);
            color: var(--white); width: 22px; height: 22px;
            border-radius: 50%; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 2s infinite;
            border: 2px solid var(--white);
        }

        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none; flex-direction: column; gap: 5px;
            cursor: pointer; padding: 10px; background: var(--light-bg);
            border: none; border-radius: 10px; z-index: 1001;
            transition: all 0.3s ease;
        }

        .mobile-menu-btn:hover { background: var(--primary); }
        .mobile-menu-btn:hover span { background: var(--white); }

        .mobile-menu-btn span {
            width: 25px; height: 3px; background: var(--text-dark);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 3px; display: block;
        }

        .mobile-menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .mobile-menu-btn.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .mobile-menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        /* Mobile Menu Overlay */
        .mobile-menu-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            opacity: 0; visibility: hidden;
            transition: all 0.4s ease; z-index: 998;
        }

        .mobile-menu-overlay.active { opacity: 1; visibility: visible; }

        /* Hero Section */
        .hero {
            min-height: 100vh; position: relative; overflow: hidden;
            display: flex; align-items: center;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.95), rgba(30, 58, 95, 0.95));
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1579154204601-01588f351e67?w=1920&q=80') center/cover;
            opacity: 0.3; animation: zoomIn 20s infinite alternate;
        }

        .hero-particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none;
        }

        .particle {
            position: absolute; background: rgba(255,255,255,0.1);
            border-radius: 50%; animation: float 15s infinite;
        }

        .hero-content {
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
            width: 100%; position: relative; z-index: 2; display: grid;
            grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
        }

        .hero-left { animation: fadeInLeft 1.2s ease-out; }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            padding: 12px 25px; border-radius: 50px; color: var(--white);
            font-size: 13px; font-weight: 500; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInDown 1s ease-out, pulse 3s infinite;
        }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 4.5rem); color: var(--white);
            font-weight: 800; line-height: 1.1; margin-bottom: 25px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .hero-title span {
            display: block; background: linear-gradient(45deg, var(--white), var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-desc {
            color: rgba(255,255,255,0.9); font-size: 18px; line-height: 1.8;
            margin-bottom: 40px; max-width: 500px; animation: fadeInUp 1s ease-out 0.5s both;
        }

        .hero-buttons {
            display: flex; gap: 20px; flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.7s both;
        }

        .btn-primary {
            background: var(--white); color: var(--primary);
            padding: 18px 40px; border-radius: 35px; text-decoration: none;
            font-weight: 600; font-size: 15px; display: inline-flex;
            align-items: center; gap: 12px; transition: all 0.4s ease;
            position: relative; overflow: hidden; border: none; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: var(--primary-dark);
        }

        .btn-secondary {
            background: transparent; color: var(--white);
            padding: 18px 40px; border-radius: 35px; text-decoration: none;
            font-weight: 600; font-size: 15px; display: inline-flex;
            align-items: center; gap: 12px; transition: all 0.4s ease;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover {
            background: var(--white); color: var(--primary);
            transform: translateY(-5px);
        }

        .hero-stats {
            display: flex; gap: 40px; margin-top: 60px;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .stat-item { text-align: center; }

        .stat-number {
            font-size: 48px; font-weight: 800; color: var(--white);
            display: block; line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .stat-label {
            color: rgba(255,255,255,0.8); font-size: 14px;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;
        }

        .hero-right {
            position: relative; animation: fadeInRight 1.2s ease-out 0.4s both;
        }

        .hero-image-main {
            width: 100%; max-width: 600px; border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            animation: float 6s ease-in-out infinite;
            border: 5px solid rgba(255,255,255,0.1);
        }

        .floating-card {
            position: absolute; background: var(--white);
            padding: 20px 25px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); display: flex;
            align-items: center; gap: 15px; animation: float 5s ease-in-out infinite;
        }

        .floating-card.card-1 { top: 10%; left: -30px; animation-delay: 0s; }
        .floating-card.card-2 { bottom: 20%; right: -20px; animation-delay: 1s; }
        .floating-card.card-3 { top: 50%; right: -40px; animation-delay: 2s; }

        .floating-icon {
            width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 22px; animation: rotate 10s linear infinite;
        }

        /* Trusted Section */
        .trusted-section {
            padding: 60px 20px; background: var(--white);
            position: relative; overflow: hidden;
        }

        .trusted-section::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, var(--white) 0%, transparent 20%, transparent 80%, var(--white) 100%);
            z-index: 2; pointer-events: none;
        }

        .trusted-content {
            max-width: 1400px; margin: 0 auto; text-align: center;
        }

        .trusted-title {
            color: var(--text-light); font-size: 14px;
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px;
        }

        .logo-marquee {
            display: flex; gap: 80px; animation: scroll 30s linear infinite;
            width: max-content;
        }

        .logo-item {
            font-size: 28px; font-weight: 700; color: var(--text-light);
            opacity: 0.5; transition: all 0.3s ease; white-space: nowrap;
        }

        .logo-item:hover { opacity: 1; color: var(--primary); transform: scale(1.1); }

        /* Services Section */
        .services-section {
            padding: 120px 20px; background: var(--light-bg); position: relative;
        }

        .section-header {
            text-align: center; max-width: 700px; margin: 0 auto 80px;
        }

        .section-label {
            display: inline-flex; align-items: center; gap: 10px;
            color: var(--primary); font-size: 14px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3.5rem); color: var(--dark-blue);
            font-weight: 700; line-height: 1.2;
        }

        .section-subtitle {
            color: var(--text-light); font-size: 18px; margin-top: 20px;
        }

        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; max-width: 1400px; margin: 0 auto;
        }

        .service-card {
            background: var(--white); padding: 40px 35px; border-radius: 25px;
            position: relative; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .service-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0; transition: opacity 0.5s ease; z-index: 0;
        }

        .service-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 60px rgba(13, 148, 136, 0.2);
        }

        .service-card:hover::before { opacity: 1; }
        .service-card > * { position: relative; z-index: 2; }

        .service-number {
            font-size: 14px; color: var(--text-light); margin-bottom: 25px;
            font-weight: 600; transition: all 0.4s ease; display: inline-block;
            padding: 8px 20px; background: var(--light-bg); border-radius: 20px;
        }

        .service-card:hover .service-number {
            color: var(--white); background: rgba(255,255,255,0.2);
        }

        .service-icon-wrap {
            width: 90px; height: 90px; margin-bottom: 25px;
            position: relative; transition: all 0.5s ease;
        }

        .service-icon {
            width: 100%; height: 100%; display: flex; align-items: center;
            justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 25px; color: var(--white); font-size: 40px;
            transition: all 0.5s ease;
        }

        .service-card:hover .service-icon {
            background: var(--white); color: var(--primary);
            transform: rotateY(360deg) scale(1.1);
        }

        .service-category {
            font-size: 12px; color: var(--text-light); text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 12px;
        }

        .service-card:hover .service-category { color: rgba(255,255,255,0.8); }

        .service-name {
            font-size: 24px; font-weight: 700; color: var(--dark-blue);
            margin-bottom: 20px; transition: all 0.4s ease;
        }

        .service-card:hover .service-name { color: var(--white); }

        .service-desc {
            color: var(--text-light); font-size: 15px; line-height: 1.7;
            margin-bottom: 25px;
        }

        .service-card:hover .service-desc { color: rgba(255,255,255,0.9); }

        .service-arrow {
            position: absolute; bottom: 35px; right: 35px;
            width: 55px; height: 55px; background: var(--light-bg);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: var(--primary); font-size: 18px;
            transition: all 0.5s ease;
        }

        .service-card:hover .service-arrow {
            background: var(--white); transform: rotate(45deg) scale(1.15);
        }

        /* Features Section */
        .features-section {
            padding: 120px 20px; background: var(--white);
        }

        .features-container {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: 1fr 1.2fr 1fr; gap: 50px; align-items: center;
        }

        .feature-col { display: flex; flex-direction: column; gap: 30px; }

        .feature-box {
            display: flex; gap: 20px; padding: 30px;
            background: var(--light-bg); border-radius: 20px;
            transition: all 0.5s ease; cursor: pointer;
        }

        .feature-box:hover {
            background: var(--white); transform: translateX(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
        }

        .feature-col-right .feature-box:hover { transform: translateX(-15px); }

        .feature-icon-box {
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 26px; flex-shrink: 0;
            transition: all 0.5s ease;
        }

        .feature-box:hover .feature-icon-box {
            transform: rotate(360deg) scale(1.1);
            background: var(--dark-blue);
        }

        .feature-center {
            position: relative; text-align: center;
        }

        .feature-image {
            width: 100%; max-width: 500px; border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            animation: float 6s ease-in-out infinite;
        }

        .feature-badge {
            position: absolute; background: var(--white);
            padding: 20px 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 15px;
            animation: float 5s ease-in-out infinite;
        }

        .feature-badge.badge-1 { top: 10%; left: -20px; }
        .feature-badge.badge-2 { bottom: 15%; right: -20px; animation-delay: 1s; }

        .badge-icon {
            width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), #f97316);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 24px;
        }

        /* Lab Detail Section */
        .lab-detail-section {
            padding: 120px 20px; background: linear-gradient(135deg, var(--light-bg), var(--white));
        }

        .lab-detail-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
        }

        .check-wrap { margin: 40px 0; }

        .check-item {
            display: flex; align-items: center; gap: 20px;
            padding: 20px; margin-bottom: 15px; background: var(--white);
            border-radius: 15px; transition: all 0.4s ease;
            cursor: pointer; border-left: 4px solid transparent;
        }

        .check-item:hover {
            transform: translateX(10px); border-left-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .check-icon {
            width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 18px; flex-shrink: 0;
            transition: all 0.4s ease;
        }

        .check-item:hover .check-icon { transform: scale(1.2) rotate(360deg); }

        .lab-detail-image { position: relative; }

        .detail-img {
            width: 100%; border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
        }

        .experience-badge {
            position: absolute; bottom: -30px; left: -30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white); padding: 30px 40px; border-radius: 25px;
            text-align: center; box-shadow: 0 20px 50px rgba(13, 148, 136, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        .exp-number { font-size: 48px; font-weight: 800; display: block; line-height: 1; }
        .exp-text { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; }

        /* Stats Section */
        .stats-section {
            padding: 100px 20px; background: var(--dark-blue); position: relative;
        }

        .stats-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        .stat-box {
            text-align: center; padding: 40px 30px;
            background: rgba(255,255,255,0.05); border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }

        .stat-box:hover {
            transform: translateY(-10px); background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 80px; height: 80px; margin: 0 auto 25px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 32px;
            animation: float 4s ease-in-out infinite;
        }

        .stat-counter {
            font-size: 52px; font-weight: 800; color: var(--white);
            margin-bottom: 10px; line-height: 1;
        }

        /* Teal Services */
        .teal-services {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 120px 20px;
        }

        .teal-header { text-align: center; margin-bottom: 80px; }
        .teal-header h2 { color: var(--white); font-size: clamp(2rem, 4vw, 3.5rem); margin-top: 20px; }

        .teal-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .teal-item {
            display: flex; align-items: center; gap: 25px;
            padding: 35px 30px; background: rgba(255,255,255,0.08);
            border-radius: 20px; transition: all 0.5s ease;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }

        .teal-item:hover {
            background: rgba(255,255,255,0.15); transform: translateX(15px);
            border-color: rgba(255,255,255,0.3);
        }

        .teal-icon {
            width: 70px; height: 70px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 28px; transition: all 0.5s ease;
        }

        .teal-item:hover .teal-icon {
            background: var(--white); color: var(--primary);
            transform: rotate(360deg) scale(1.1);
        }

        .teal-content { flex: 1; }
        .teal-number { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 8px; }
        .teal-title { color: var(--white); font-size: 22px; font-weight: 600; }

        /* Case Studies */
        .case-studies { padding: 120px 20px; background: var(--light-bg); }

        .case-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 35px;
        }

        .case-card {
            position: relative; border-radius: 30px; overflow: hidden;
            height: 450px; cursor: pointer; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
        }

        .case-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .case-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: all 0.8s ease;
        }

        .case-card:hover img { transform: scale(1.3) rotate(5deg); }

        .case-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 50px 40px;
            background: linear-gradient(to top, rgba(13, 148, 136, 0.95), transparent);
            color: var(--white);
        }

        .case-category {
            display: inline-block; font-size: 12px; text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 15px; padding: 8px 20px;
            background: rgba(255,255,255,0.2); border-radius: 20px;
        }

        .case-title { font-size: 28px; font-weight: 700; margin-bottom: 15px; }

        /* Team Section */
        .team-section { padding: 120px 20px; background: var(--white); }

        .team-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .team-card {
            background: var(--white); border-radius: 25px;
            overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            transition: all 0.5s ease;
        }

        .team-card:hover {
            transform: translateY(-15px); box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .team-image { position: relative; height: 350px; overflow: hidden; }

        .team-image img {
            width: 100%; height: 100%; object-fit: cover;
            transition: all 0.6s ease;
        }

        .team-card:hover .team-image img { transform: scale(1.15); }

        .team-social {
            position: absolute; top: 20px; right: -50px;
            display: flex; flex-direction: column; gap: 10px;
            transition: all 0.5s ease;
        }

        .team-card:hover .team-social { right: 20px; }

        .team-social a {
            width: 45px; height: 45px; background: var(--white);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary); text-decoration: none; font-size: 18px;
            transition: all 0.3s ease;
        }

        .team-social a:hover {
            background: var(--primary); color: var(--white);
            transform: scale(1.2) rotate(360deg);
        }

        .team-info { padding: 30px; text-align: center; }

        .team-info h4 {
            font-size: 24px; color: var(--dark-blue); margin-bottom: 8px;
        }

        .team-role {
            color: var(--primary); font-size: 14px; text-transform: uppercase;
            letter-spacing: 2px; font-weight: 600;
        }

        /* Testimonials */
        .testimonials {
            padding: 120px 20px;
            background: linear-gradient(135deg, var(--light-bg), var(--white));
        }

        .testimonial-container {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: center;
        }

        .testimonial-slider {
            position: relative; background: var(--white);
            padding: 60px; border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .quote-icon {
            position: absolute; top: 30px; left: 40px;
            font-size: 80px; color: var(--primary); opacity: 0.1;
        }

        .stars { display: flex; gap: 8px; margin-bottom: 25px; }
        .star { color: #fbbf24; font-size: 22px; }

        .testimonial-text {
            font-size: 22px; color: var(--text-dark); line-height: 1.8;
            margin-bottom: 40px; font-style: italic;
        }

        .testimonial-author {
            display: flex; align-items: center; gap: 20px;
        }

        .author-img {
            width: 70px; height: 70px; border-radius: 50%;
            object-fit: cover; border: 4px solid var(--primary);
        }

        .author-info h4 { font-size: 20px; color: var(--dark-blue); margin-bottom: 5px; }
        .author-info p { color: var(--text-light); font-size: 14px; }

        .testimonial-nav {
            display: flex; gap: 15px; margin-top: 30px;
        }

        .nav-btn {
            width: 55px; height: 55px; border: 2px solid var(--light-bg);
            border-radius: 50%; background: var(--white);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); cursor: pointer; transition: all 0.4s ease;
            font-size: 18px;
        }

        .nav-btn:hover {
            background: var(--primary); color: var(--white);
            transform: scale(1.1);
        }

        .info-cards { display: flex; flex-direction: column; gap: 25px; }

        .info-card {
            display: flex; gap: 25px; padding: 35px;
            background: var(--white); border-radius: 25px;
            transition: all 0.5s ease; cursor: pointer;
        }

        .info-card:hover {
            transform: translateX(20px);
            border: 2px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .info-icon {
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 28px; flex-shrink: 0;
            transition: all 0.5s ease;
        }

        .info-card:hover .info-icon {
            transform: rotate(360deg) scale(1.1);
            background: var(--dark-blue);
        }

        /* Pricing Section */
        .pricing-section { padding: 120px 20px; background: var(--white); }

        .pricing-grid {
            max-width: 1200px; margin: 0 auto; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px; align-items: center;
        }

        .pricing-card {
            background: var(--white); border-radius: 30px;
            padding: 50px 40px; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            transition: all 0.5s ease;
            border: 2px solid transparent;
        }

        .pricing-card.featured {
            transform: scale(1.05); border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(13, 148, 136, 0.2);
        }

        .pricing-card:hover { transform: translateY(-15px); }
        .pricing-card.featured:hover { transform: scale(1.05) translateY(-15px); }

        .pricing-badge {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent), #f97316);
            color: var(--white); padding: 10px 30px; border-radius: 30px;
            font-size: 13px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; animation: pulse 2s infinite;
        }

        .pricing-icon {
            width: 90px; height: 90px; margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 40px;
        }

        .pricing-name { font-size: 28px; color: var(--dark-blue); margin-bottom: 15px; font-weight: 700; }

        .pricing-price {
            font-size: 56px; font-weight: 800; color: var(--primary);
            margin-bottom: 10px; line-height: 1;
        }

        .pricing-price span { font-size: 18px; color: var(--text-light); font-weight: 400; }

        .pricing-period { color: var(--text-light); font-size: 15px; margin-bottom: 40px; }

        .pricing-features {
            list-style: none; margin-bottom: 40px; text-align: left;
        }

        .pricing-features li {
            padding: 15px 0; border-bottom: 1px solid var(--light-bg);
            display: flex; align-items: center; gap: 15px; color: var(--text-dark);
        }

        .pricing-features li.included::before {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            color: var(--success);
        }

        .pricing-features li.not-included { color: var(--text-light); opacity: 0.6; }
        .pricing-features li.not-included::before {
            content: '\f00d'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            color: var(--error);
        }

        .pricing-btn {
            width: 100%; padding: 18px; background: var(--light-bg);
            color: var(--dark-blue); border: none; border-radius: 15px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.4s ease;
        }

        .pricing-btn:hover {
            background: var(--primary); color: var(--white);
            transform: translateY(-3px);
        }

        /* FAQ Section */
        .faq-section { padding: 120px 20px; background: var(--light-bg); }

        .faq-container { max-width: 900px; margin: 0 auto; }

        .faq-item {
            background: var(--white); border-radius: 20px;
            margin-bottom: 20px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
        }

        .faq-item:hover { box-shadow: 0 15px 40px rgba(0,0,0,0.1); }

        .faq-question {
            padding: 30px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; font-weight: 600;
            color: var(--dark-blue); font-size: 18px;
        }

        .faq-item.active .faq-question { color: var(--primary); }

        .faq-icon {
            width: 40px; height: 40px; background: var(--light-bg);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: all 0.4s ease; color: var(--primary);
        }

        .faq-item.active .faq-icon {
            background: var(--primary); color: var(--white);
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0; overflow: hidden; transition: all 0.5s ease;
            padding: 0 30px;
        }

        .faq-item.active .faq-answer {
            max-height: 300px; padding-bottom: 30px;
        }

        .faq-answer p { color: var(--text-light); line-height: 1.8; }

        /* Blog Section */
        .blog-section { padding: 120px 20px; background: var(--white); }

        .blog-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .blog-card {
            background: var(--white); border-radius: 25px;
            overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            transition: all 0.5s ease;
        }

        .blog-card:hover {
            transform: translateY(-15px); box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .blog-image { position: relative; height: 250px; overflow: hidden; }

        .blog-image img {
            width: 100%; height: 100%; object-fit: cover;
            transition: all 0.6s ease;
        }

        .blog-card:hover .blog-image img { transform: scale(1.2) rotate(3deg); }

        .blog-date {
            position: absolute; top: 20px; left: 20px;
            background: var(--primary); color: var(--white);
            padding: 15px 20px; border-radius: 15px; text-align: center;
        }

        .blog-date .day { font-size: 28px; font-weight: 800; display: block; line-height: 1; }
        .blog-date .month { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

        .blog-content { padding: 35px; }

        .blog-meta {
            display: flex; gap: 20px; margin-bottom: 20px;
            color: var(--text-light); font-size: 14px;
        }

        .blog-title {
            font-size: 24px; color: var(--dark-blue); margin-bottom: 20px;
            line-height: 1.4;
        }

        .read-more {
            display: inline-flex; align-items: center; gap: 10px;
            color: var(--primary); text-decoration: none; font-weight: 600;
            transition: all 0.4s ease;
        }

        .read-more:hover { gap: 20px; }

        /* Contact Section */
        .contact-section {
            padding: 120px 20px;
            background: linear-gradient(135deg, var(--dark-blue), var(--darker-blue));
            position: relative;
        }

        .contact-container {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: 1fr 1.2fr; gap: 80px;
        }

        .contact-info-block h2 {
            font-size: 48px; color: var(--white); margin-bottom: 30px;
            line-height: 1.2;
        }

        .contact-info-block > p {
            color: rgba(255,255,255,0.8); font-size: 18px;
            line-height: 1.8; margin-bottom: 50px;
        }

        .contact-details { display: flex; flex-direction: column; gap: 30px; }

        .contact-item {
            display: flex; gap: 25px; padding: 30px;
            background: rgba(255,255,255,0.05); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }

        .contact-item:hover {
            background: rgba(255,255,255,0.1); transform: translateX(15px);
            border-color: var(--primary);
        }

        .contact-item-icon {
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 24px; flex-shrink: 0;
        }

        .contact-form-wrapper {
            background: var(--white); padding: 60px; border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
        }

        .form-header {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 40px;
        }

        .form-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 30px;
        }

        .form-header h2 { color: var(--dark-blue); font-size: 36px; }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 25px; margin-bottom: 25px;
        }

        .form-group.full { grid-column: 1 / -1; }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%; padding: 20px 25px; border: 2px solid var(--light-bg);
            border-radius: 15px; font-size: 15px; transition: all 0.4s ease;
            background: var(--light-bg); font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none; border-color: var(--primary);
            background: var(--white);
            transform: translateY(-3px);
        }

        .submit-btn {
            width: 100%; padding: 22px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white); border: none; border-radius: 15px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.4s ease; text-transform: uppercase;
            letter-spacing: 3px;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(13, 148, 136, 0.4);
        }

        /* Footer */
        footer {
            background: var(--darker-blue); color: var(--white);
            padding: 100px 20px 40px;
        }

        .footer-grid {
            max-width: 1400px; margin: 0 auto; display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr; gap: 50px;
            margin-bottom: 80px;
        }

        .footer-brand .logo { color: var(--white); margin-bottom: 25px; }

        .footer-brand > p {
            color: rgba(255,255,255,0.7); line-height: 1.9;
            margin-bottom: 30px; font-size: 15px;
        }

        .footer-social { display: flex; gap: 15px; }

        .social-link {
            width: 50px; height: 50px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--white); text-decoration: none; transition: all 0.4s ease;
        }

        .social-link:hover {
            background: var(--primary); border-color: var(--primary);
            transform: translateY(-5px);
        }

        .footer-column h4 {
            color: var(--white); font-size: 20px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 12px;
        }

        .footer-column ul { list-style: none; }

        .footer-column li { margin-bottom: 15px; }

        .footer-column a {
            color: rgba(255,255,255,0.7); text-decoration: none;
            transition: all 0.4s ease; display: flex; align-items: center;
            gap: 12px; font-size: 15px;
        }

        .footer-column a:hover { color: var(--primary); padding-left: 10px; }

        .newsletter-form { margin-top: 25px; position: relative; }

        .newsletter-form input {
            width: 100%; padding: 18px 60px 18px 25px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: var(--white); font-size: 15px;
        }

        .newsletter-btn {
            position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; background: var(--primary);
            border: none; border-radius: 12px; color: var(--white);
            cursor: pointer; transition: all 0.4s ease;
        }

        .newsletter-btn:hover { background: var(--primary-light); }

        .footer-bottom {
            max-width: 1400px; margin: 0 auto;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 40px; display: flex;
            justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: 20px;
        }

        .footer-bottom p { color: rgba(255,255,255,0.5); font-size: 14px; }

        /* Back to Top */
        .back-to-top {
            position: fixed; bottom: 40px; right: 40px;
            width: 60px; height: 60px; background: var(--white);
            border: 3px solid var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); cursor: pointer; opacity: 0; visibility: hidden;
            transition: all 0.4s ease; z-index: 999;
            font-size: 20px;
        }

        .back-to-top.visible { opacity: 1; visibility: visible; }

        .back-to-top:hover {
            background: var(--primary); color: var(--white);
            transform: translateY(-10px);
        }

        /* Login Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; visibility: hidden;
            transition: all 0.5s ease; padding: 20px;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .login-modal {
            background: var(--white); padding: 60px; border-radius: 40px;
            width: 100%; max-width: 500px; position: relative;
            transform: scale(0.8); transition: all 0.6s ease;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
        }

        .modal-overlay.active .login-modal { transform: scale(1); }

        .close-modal {
            position: absolute; top: 25px; right: 25px;
            width: 50px; height: 50px; border: none;
            background: var(--light-bg); border-radius: 50%;
            cursor: pointer; font-size: 24px; color: var(--text-dark);
            transition: all 0.4s ease;
        }

        .close-modal:hover {
            background: var(--error); color: var(--white);
            transform: rotate(180deg);
        }

        .modal-header { text-align: center; margin-bottom: 40px; }

        .modal-icon {
            width: 100px; height: 100px; margin: 0 auto 25px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--white); font-size: 45px;
        }

        .login-form .form-group { margin-bottom: 25px; position: relative; }

        .login-form input {
            width: 100%; padding: 20px 25px 20px 55px;
            border: 2px solid var(--light-bg); border-radius: 15px;
            font-size: 16px; transition: all 0.4s ease; background: var(--light-bg);
        }

        .login-form input:focus {
            outline: none; border-color: var(--primary);
            background: var(--white);
        }

        .input-icon {
            position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
            color: var(--text-light); font-size: 20px;
        }

        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; font-size: 14px;
        }

        .login-submit {
            width: 100%; padding: 22px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white); border: none; border-radius: 15px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.4s ease;
        }

        .login-submit:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(13, 148, 136, 0.4);
        }

        .login-divider {
            text-align: center; margin: 35px 0; position: relative;
        }

        .login-divider::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: var(--light-bg);
        }

        .login-divider span {
            background: var(--white); padding: 0 25px; position: relative;
            color: var(--text-light); font-size: 14px;
        }

        .social-login { display: flex; gap: 20px; }

        .social-login-btn {
            flex: 1; padding: 18px; border: 2px solid var(--light-bg);
            border-radius: 15px; background: var(--white); cursor: pointer;
            transition: all 0.4s ease;
            font-size: 15px; font-weight: 500;
        }

        .social-login-btn:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }
