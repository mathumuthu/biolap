<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | BioLab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

/* Floating DNA animation */

.dna{
position:absolute;
width:4px;
height:120px;
background:rgba(255,255,255,0.1);
animation:float 6s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg)}
100%{transform:translateY(-100vh) rotate(360deg)}
}

/* Main container */

.container{
text-align:center;
padding:40px;
max-width:600px;
width:90%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 0 40px rgba(0,255,200,0.3);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px)}
to{opacity:1; transform:translateY(0)}
}

.icon{
font-size:80px;
animation:rotate 6s infinite linear;
}

@keyframes rotate{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

h1{
font-size:90px;
color:#00ffc3;
margin-bottom:10px;
}

h2{
font-weight:500;
margin-bottom:15px;
}

p{
opacity:0.8;
margin-bottom:30px;
}

/* Button */

.btn{
display:inline-block;
padding:12px 30px;
background:#00ffc3;
color:#002;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn:hover{
background:white;
transform:scale(1.05);
}

/* Responsive */

@media(max-width:600px){

h1{
font-size:60px;
}

.icon{
font-size:60px;
}

.container{
padding:30px;
}

}

</style>
</head>

<body>

<!-- Floating DNA Elements -->

<div class="dna" style="left:10%"></div>
<div class="dna" style="left:30%"></div>
<div class="dna" style="left:50%"></div>
<div class="dna" style="left:70%"></div>
<div class="dna" style="left:90%"></div>

<div class="container">

<div class="icon">🧬</div>

<h1>404</h1>

<h2>Cell Not Found</h2>

<p>
Oops! The biological sample you're looking for doesn't exist.
The page may have mutated or been removed from our lab database.
</p>

<a href="index.html" class="btn">Return to Lab</a>

</div>

<script>

/* Generate more floating DNA */

for(let i=0;i<20;i++){

let dna=document.createElement("div")
dna.className="dna"

dna.style.left=Math.random()*100+"%"
dna.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(dna)

}

</script>

</body>
</html>
