
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi User Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Animated Background */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#5b2cff,#8e2de2,#00c6ff,#7f00ff);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Back Button */

.back{
position:absolute;
top:30px;
left:40px;
color:white;
font-size:16px;
text-decoration:none;
font-weight:500;
transition:.3s;
}

.back:hover{
transform:translateX(-5px);
}

/* Glass Card */

.container{
width:400px;
padding:40px;
border-radius:18px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 20px 60px rgba(0,0,0,0.25);
text-align:center;
animation:cardFloat 4s ease-in-out infinite;
}

/* Floating animation */

@keyframes cardFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Logo */

.logo{
width:65px;
height:65px;
margin:auto;
margin-bottom:15px;
background:linear-gradient(135deg,#5b2cff,#8e2de2);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:26px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* Title */

h2{
color:white;
margin-bottom:5px;
}

.subtitle{
color:#ddd;
font-size:14px;
margin-bottom:25px;
}

/* Inputs */

.input-group{
text-align:left;
margin-bottom:18px;
}

label{
font-size:13px;
color:white;
margin-bottom:6px;
display:block;
}

select,input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
transition:.3s;
}

select:focus,input:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* Password */

.password-box{
position:relative;
}

.eye{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
}

/* Remember */

.row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
margin-top:8px;
color:white;
}

.row a{
color:#fff;
text-decoration:none;
opacity:.8;
}

/* Button */

button{
margin-top:22px;
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#2f6bff,#a200ff);
color:white;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Signup */

.signup{
margin-top:18px;
font-size:14px;
color:white;
}

.signup a{
color:#fff;
font-weight:500;
text-decoration:underline;
}

/* Mobile */

@media(max-width:450px){

.container{
width:90%;
padding:30px;
}

}

</style>
</head>

<body>

<a href="index.html" class="back">← Back to Home</a>

<div class="container">

<div class="logo">⚛</div>

<h2>Welcome Back</h2>
<p class="subtitle">Login to access your account</p>

<form onsubmit="loginUser(event)">

<div class="input-group">
<label>Login As</label>

<select id="role">
<option value="Administrator">Administrator</option>
<option value="Researcher" selected>Researcher</option>
<option value="Patient">Patient</option>
</select>
</div>

<div class="input-group">
<label>Password</label>

<div class="password-box">
<input type="password" id="password" placeholder="Enter Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

</div>

<div class="row">
<label>
<input type="checkbox"> Remember me
</label>
<a href="for.html">Forgot password?</a>
</div>

<button type="submit">Login to Dashboard</button>

</form>

<div class="signup">
Don't have an account?
<a href="sig.html">Sign up</a>
</div>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

function loginUser(event){

event.preventDefault();

let role=document.getElementById("role").value;

if(role==="Administrator"){
window.location.href="Dash1.html";
}

else if(role==="Researcher"){
window.location.href="dash2.html";
}

else if(role==="Patient"){
window.location.href="Dash3.html";
}

}

</script>

</body>
</html>
